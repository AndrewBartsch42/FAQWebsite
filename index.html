	<h1>Bear Sizes</h1>

	<h2 src="images/question1.jpg" alt="Black Bears" id="p1">
		<a href="#" >Whats the average black bear size?</a>
	</h2>
	<div>
		<p>120 to 188 cm in length and 63 to 103.5 cm in height (measured from ground to shoulder)</p>
	</div>

	<h2 src="images/question2.jpg" alt="Grizzly" id="p2">
		<a href="#" >Whats the average grizzly bear size?</a>
	</h2>
	<div>
		<p>1.4 to 2.8 meters in length and 70 to 153 cm in height (measured from ground to shoulder)</p>
	</div>
